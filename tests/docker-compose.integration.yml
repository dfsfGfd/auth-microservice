version: '3.8'

services:
  # PostgreSQL для интеграционных тестов (версия как в production)
  postgres-test:
    image: postgres:18-alpine
    container_name: auth-postgres-test
    environment:
      POSTGRES_USER: auth_test_user
      POSTGRES_PASSWORD: auth_test_password
      POSTGRES_DB: auth_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_test_user -d auth_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d:ro
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - auth-test-network

  # Redis для интеграционных тестов (версия как в production)
  redis-test:
    image: redis:7.4-alpine
    container_name: auth-redis-test
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - auth-test-network

  # Auth микросервис для интеграционных тестов
  auth-test:
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
    container_name: auth-service-test
    environment:
      APP_ENV: test
      HTTP_PORT: 8080
      GRPC_PORT: 9090
      DATABASE_URL: postgres://auth_test_user:auth_test_password@postgres-test:5432/auth_test?sslmode=disable
      DATABASE_MAX_CONNECTIONS: 10
      DATABASE_CONNECTION_TIMEOUT: 10
      REDIS_URL: redis://redis-test:6379
      REDIS_DB: 0
      REDIS_CONNECTION_TIMEOUT: 5
      JWT_SECRET: test-super-secret-key-minimum-32-chars-long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 336h
      JWT_ISSUER: auth-service-test
      LOG_LEVEL: debug
      LOG_FORMAT: console
      LOG_SERVICE_NAME: auth-service-test
      RATE_LIMIT_REGISTER: 100
      RATE_LIMIT_LOGIN: 100
      RATE_LIMIT_REFRESH: 100
      RATE_LIMIT_LOGOUT: 100
      HEALTH_PATH: /health
      SHUTDOWN_TIMEOUT: 30
    ports:
      - "8081:8080"
      - "9091:9090"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - auth-test-network
    restart: "no"

volumes:
  postgres_test_data:

networks:
  auth-test-network:
    driver: bridge
