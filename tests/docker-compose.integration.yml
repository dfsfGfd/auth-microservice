version: '3.8'

services:
  # PostgreSQL для интеграционных тестов
  postgres-test:
    image: postgres:18-alpine
    container_name: auth-postgres-test
    environment:
      POSTGRES_USER: auth_test_user
      POSTGRES_PASSWORD: auth_test_password
      POSTGRES_DB: auth_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_test_user -d auth_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - auth-test-network

  # Redis для интеграционных тестов
  redis-test:
    image: redis:7.4-alpine
    container_name: auth-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - auth-test-network

  # Auth микросервис для интеграционных тестов
  auth-test:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: auth-service-test
    env_file:
      - .env.test
    environment:
      DATABASE_URL: postgres://auth_test_user:auth_test_password@postgres-test:5432/auth_test?sslmode=disable
      REDIS_URL: redis://redis-test:6379
    ports:
      - "8081:8080"
      - "9091:9090"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - auth-test-network
    restart: "no"

networks:
  auth-test-network:
    driver: bridge
