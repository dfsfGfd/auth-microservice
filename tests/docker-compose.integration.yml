services:
  # PostgreSQL для интеграционных тестов
  postgres-test:
    image: postgres:18-alpine
    container_name: auth-postgres-test
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - auth-test-network

  # Redis для интеграционных тестов
  redis-test:
    image: redis:7.4-alpine
    container_name: auth-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - auth-test-network

  # Auth микросервис для интеграционных тестов
  auth-test:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: auth-service-test
    environment:
      - ENV=${ENV}
      - HTTP_PORT=${HTTP_PORT}
      - GRPC_PORT=${GRPC_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS}
      - DATABASE_CONNECTION_TIMEOUT=${DATABASE_CONNECTION_TIMEOUT}
      - REDIS_URL=${REDIS_URL}
      - REDIS_DB=${REDIS_DB}
      - REDIS_CONNECTION_TIMEOUT=${REDIS_CONNECTION_TIMEOUT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
      - JWT_ISSUER=${JWT_ISSUER}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - LOG_SERVICE_NAME=${LOG_SERVICE_NAME}
      - RATE_LIMIT_REGISTER=${RATE_LIMIT_REGISTER}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN}
      - RATE_LIMIT_REFRESH=${RATE_LIMIT_REFRESH}
      - RATE_LIMIT_LOGOUT=${RATE_LIMIT_LOGOUT}
      - HEALTH_PATH=${HEALTH_PATH}
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT}
    ports:
      - "8081:8080"
      - "9091:9090"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - auth-test-network
    restart: "no"

networks:
  auth-test-network:
    driver: bridge
