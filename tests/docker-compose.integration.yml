# Docker Compose для интеграционных тестов
# Запускает: auth-service + postgres + redis
# Использование: docker-compose -f docker-compose.integration.yml up --build
version: '3.8'

services:
  # Auth Service (тестовый сервер)
  auth-service:
    build:
      context: ..
      dockerfile: ../deploy/Dockerfile
    container_name: auth-integration-test
    ports:
      - "8080:8080"  # HTTP
      - "9090:9090"  # gRPC
    environment:
      - APP_ENV=test
      - HTTP_PORT=8080
      - GRPC_PORT=9090
      - DATABASE_URL=postgres://test_user:test_password@postgres:5432/auth_test?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=test-secret-key-minimum-32-characters-long-for-integration-tests
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - RATE_LIMIT_REGISTER=100
      - RATE_LIMIT_LOGIN=100
      - RATE_LIMIT_REFRESH=100
      - RATE_LIMIT_LOGOUT=100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - integration-test-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: "no"

  # Migrations (применяется перед запуском сервиса)
  migrate:
    build:
      context: ..
      dockerfile: ../deploy/Dockerfile
    container_name: auth-integration-migrate
    environment:
      - DATABASE_URL=postgres://test_user:test_password@postgres:5432/auth_test?sslmode=disable
    command: ["/app/migrate", "-dsn", "postgres://test_user:test_password@postgres:5432/auth_test?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - integration-test-network
    restart: "no"

  # PostgreSQL
  postgres:
    image: postgres:18-alpine
    container_name: auth-integration-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_DB=auth_test
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - integration-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d auth_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: "no"

  # Redis
  redis:
    image: redis:7.4-alpine
    container_name: auth-integration-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_test_data:/data
    networks:
      - integration-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: "no"

networks:
  integration-test-network:
    driver: bridge

volumes:
  postgres_test_data:
    driver: local
  redis_test_data:
    driver: local
