version: '3'

# Глобальные переменные проекта
vars:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v1.64.0'
  GCI_VERSION: 'v0.13.6'
  GOFUMPT_VERSION: 'v0.7.0'
  BUF_VERSION: '1.66.1'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.5.1'
  PROTOC_GEN_GRPC_GATEWAY_VERSION: 'v2.28.0'
  PROTOC_GEN_VALIDATE_VERSION: 'v1.2.1'
  PROTOC_GEN_OPENAPIV2_VERSION: 'v2.28.0'

  BIN_DIR: '{{.USER_WORKING_DIR}}/bin'

  # Пути к бинарникам (в кавычках для путей с пробелами)
  GOLANGCI_LINT: '"{{.BIN_DIR}}/golangci-lint"'
  GCI: '"{{.BIN_DIR}}/gci"'
  GOFUMPT: '"{{.BIN_DIR}}/gofumpt"'
  BUF: '"{{.BIN_DIR}}/buf"'

tasks:
  # ==================== Build & Lint ====================

  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt в ./bin"
    cmds:
      - go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - go install github.com/daixiang0/gci@{{.GCI_VERSION}}
    env:
      GOBIN: '{{.BIN_DIR}}'
    status:
      - test -f "{{.BIN_DIR}}/gofumpt"
      - test -f "{{.BIN_DIR}}/gci"

  format:
    desc: "Форматирует весь проект gofumpt + gci"
    deps: [ install-formatters ]
    cmds:
      - '{{.GOFUMPT}} -extra -w .'
      - '{{.GCI}} write -s standard -s default -s "prefix(github.com/dfsfGfd/user_microservice/)" .'

  install-golangci-lint:
    desc: "Устанавливает golangci-lint в каталог bin"
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    env:
      GOBIN: '{{.BIN_DIR}}'
    status:
      - test -f "{{.BIN_DIR}}/golangci-lint"

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    cmds:
      - '{{.GOLANGCI_LINT}} run ./... --config=.golangci.yml'

  tidy:
    desc: "Очистка зависимостей"
    cmds:
      - go mod tidy

  # ==================== Code Generation ====================

  wire:gen:
    desc: "Генерация DI кода через Google Wire"
    cmds:
      - go run github.com/google/wire/cmd/wire@latest ./internal/di

  wire:check:
    desc: "Проверка DI кода на ошибки"
    cmds:
      - go run github.com/google/wire/cmd/wire@latest ./internal/di check

  install-buf:
    desc: "Устанавливает Buf в каталог bin"
    cmds:
      - go install github.com/bufbuild/buf/cmd/buf@v{{.BUF_VERSION}}
    env:
      GOBIN: '{{.BIN_DIR}}'
    status:
      - test -f "{{.BIN_DIR}}/buf"

  proto:install-plugins:
    desc: "Устанавливает protoc плагины в GOPATH"
    cmds:
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
      - go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@{{.PROTOC_GEN_GRPC_GATEWAY_VERSION}}
      - go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@{{.PROTOC_GEN_OPENAPIV2_VERSION}}

  proto:deps:
    deps: [ install-buf ]
    desc: "Обновляет зависимости protobuf (googleapis)"
    cmds:
      - 'cd proto && PATH="$HOME/go/bin:$PATH" {{.BUF}} dep update'

  proto:lint:
    deps: [ install-buf, proto:deps ]
    desc: "Проверка .proto-файлов на соответствие стилю"
    cmds:
      - 'cd proto && PATH="$HOME/go/bin:$PATH" {{.BUF}} lint'

  proto:gen:
    deps: [ install-buf, proto:install-plugins, proto:deps, proto:lint ]
    desc: "Генерация Go-кода из .proto (gRPC + REST + Swagger)"
    cmds:
      - 'cd proto && PATH="$HOME/go/bin:$PATH" {{.BUF}} generate'

  # ==================== Server Commands ====================

  server:build:
    desc: "Сборка бинарного файла сервера"
    cmds:
      - |
        echo "Building server..."
        go build -o bin/server ./cmd/server
        echo "Build complete: bin/server"

  server:run:
    desc: "Запуск сервера (локально, требуется .env)"
    deps: [ server:build ]
    cmds:
      - |
        echo "Starting server..."
        ./bin/server

  server:dev:
    desc: "Запуск сервера в режиме разработки (go run)"
    cmds:
      - go run ./cmd/server

  server:stop:
    desc: "Остановка запущенного сервера (kill process)"
    cmds:
      - |
        echo "Stopping server..."
        pkill -f "bin/server" 2>/dev/null || pkill -f "go run ./cmd/server" 2>/dev/null || echo "Server not running"

  # ==================== Integration Tests ====================

  test:integration:
    desc: "Запуск интеграционных тестов (требует Docker)"
    cmds:
      - |
        echo "Running integration tests..."
        go test -tags integration -v -timeout 5m ./tests/...

  test:integration:up:
    desc: "Поднять контейнеры для интеграционных тестов"
    cmds:
      - |
        echo "Starting test infrastructure..."
        docker compose -f tests/docker-compose.integration.yml up -d --build
        sleep 5
        echo "Services started. Run tests with: task test:integration"

  test:integration:down:
    desc: "Остановить и удалить контейнеры интеграционных тестов"
    cmds:
      - |
        echo "Cleaning up test containers..."
        docker compose -f tests/docker-compose.integration.yml down -v --remove-orphans
        echo "Cleanup complete"

  # ==================== Migrations ====================

  migrate:install:
    desc: "Установить golang-migrate CLI"
    cmds:
      - go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
    env:
      GOBIN: '{{.BIN_DIR}}'
    status:
      - test -f "{{.BIN_DIR}}/migrate"

  migrate:up:
    desc: "Применить все миграции (локально)"
    deps: [ migrate:install ]
    cmds:
      - |
        echo "Running migrations..."
        {{.BIN_DIR}}/migrate -path migrations -database "{{.DATABASE_URL}}" up

  migrate:down:
    desc: "Откатить последнюю миграцию (локально)"
    deps: [ migrate:install ]
    cmds:
      - |
        echo "Rolling back migration..."
        {{.BIN_DIR}}/migrate -path migrations -database "{{.DATABASE_URL}}" down

  migrate:status:
    desc: "Показать статус миграций (локально)"
    deps: [ migrate:install ]
    cmds:
      - |
        echo "Checking migration status..."
        {{.BIN_DIR}}/migrate -path migrations -database "{{.DATABASE_URL}}" status

  migrate:force:
    desc: "Установить версию миграции (force)"
    deps: [ migrate:install ]
    cmds:
      - |
        echo "Forcing migration version..."
        {{.BIN_DIR}}/migrate -path migrations -database "{{.DATABASE_URL}}" force {{.VERSION}}

  # ==================== Quick Commands ====================

  dev:
    desc: "Быстрый старт для разработки (format + lint + tidy + run)"
    deps: [ format, lint, tidy ]
    cmds:
      - task: server:dev
