# Auth Microservice — Configuration Template
# Скопируйте в config.yaml и настройте под ваше окружение

server:
  port: 8080
  grpc_port: 9090
  env: development  # development, staging, production

database:
  # PostgreSQL DSN
  url: postgres://auth_user:auth_password@localhost:5432/auth?sslmode=disable
  # Максимум подключений в пуле
  max_connections: 25
  # Таймаут подключения (сек)
  connection_timeout: 10

redis:
  # Redis DSN
  url: redis://localhost:6379
  # DB номер (0-15)
  db: 0
  # Таймаут подключения (сек)
  connection_timeout: 5

jwt:
  # Секретный ключ (минимум 32 символа)
  secret: your-super-secret-key-minimum-32-characters-long
  # Время жизни access токена (15m, 1h, 24h)
  access_ttl: 15m
  # Время жизни refresh токена (1h, 24h, 168h, 336h)
  refresh_ttl: 336h
  # Issuer для JWT claims
  issuer: auth-service

cookie:
  # Флаг Secure (true для HTTPS)
  secure: false
  # Флаг HttpOnly (защита от XSS)
  http_only: true
  # SameSite: Strict, Lax, None
  same_site: Lax
  # Домен cookie (опционально)
  domain: ""
  # Путь cookie
  path: /
  # Время жизни (сек)
  max_age: 1209600

logging:
  # Уровень: debug, info, warn, error, fatal
  level: debug
  # Формат: json, console
  format: console
  # Название сервиса
  service_name: auth-service

cors:
  # Разрешённые origin
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8080
  # Разрешённые методы
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  # Разрешённые заголовки
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Request-ID
  # Max age для preflight (сек)
  max_age: 86400

rate_limit:
  # Лимиты запросов в минуту
  register: 5
  login: 10
  refresh: 30
  logout: 60

health:
  # Путь health check endpoint
  path: /health

shutdown:
  # Таймаут graceful shutdown (сек)
  timeout: 30
